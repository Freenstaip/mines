<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Mines Demo</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title">Mines</div>
      <div class="balance-box">
        <span>Balance</span>
        <strong id="balance">10.00 $</strong>
      </div>
    </header>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Mines board"></div>
    </section>

    <section class="info-card">
      <div class="info-left">
        <img src="./assets/star.png" alt="" />
        <div>
          <span id="statusLabel">Demo balance</span>
          <strong id="statusValue">10.00 $</strong>
        </div>
      </div>

      <div class="traps">
        <button id="trapMinus" type="button">‹</button>
        <div><strong id="trapCount">1</strong><span>Traps</span></div>
        <button id="trapPlus" type="button">›</button>
      </div>
    </section>

    <section class="bet-card">
      <div class="bet-row">
        <button id="minus" type="button">−</button>
        <strong><span id="bet">0.20</span> $</strong>
        <button id="plus" type="button">+</button>
      </div>

      <button id="playBtn" class="play" type="button">Start</button>
      <button id="cashoutBtn" class="cashout hidden" type="button">
        Collect <strong id="cashoutValue">0.00$</strong>
      </button>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
