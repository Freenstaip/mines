<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Mines Demo Game</title>
   <meta name="description" content="Play Mines demo mode for free using strategies and life hacks from TikTok.">
  <link rel="stylesheet" href="./styles.css?v=20260619-v5" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title">Mines</div>
      <div class="balance-box">
        <span>Balance</span>
        <strong id="balance">10.00 $</strong>
      </div>
    </header>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Mines board"></div>
    </section>

    <section class="info-card">
      <div class="info-left">
        <img src="./assets/star.png" alt="" />
        <div>
          <span id="statusLabel">Max. win</span>
          <strong id="statusValue">10.00 $</strong>
        </div>
      </div>

      <div id="multiplierStrip" class="multiplier-strip hidden" aria-label="Next multipliers"></div>

      <div class="traps">
        <button id="trapMinus" type="button">‹</button>
        <div><strong id="trapCount">1</strong><span>Traps</span></div>
        <button id="trapPlus" type="button">›</button>
      </div>
    </section>

    <section class="bet-card">
      <div class="bet-row">
        <button id="minus" type="button">−</button>
        <strong><span id="bet">0.20</span> $</strong>
        <button id="plus" type="button">+</button>
      </div>

      <button id="playBtn" class="play" type="button">Start</button>
      <button id="directPartnerBtn" class="direct-partner" type="button">GET MONEY 💰</button>
      <button id="cashoutBtn" class="cashout hidden" type="button">
        Collect <strong id="cashoutValue">0.00$</strong>
      </button>
    </section>
  </main>

  <div id="partnerModal" class="partner-modal hidden" aria-hidden="true">
    <div class="partner-card" role="dialog" aria-modal="true" aria-labelledby="partnerTitle">
      <div class="partner-badge">FINISHED</div>
      <h2 id="partnerTitle">Continuation of the game</h2>
      <p id="partnerText">To continue playing, you need to register.</p>
      <button id="partnerButton" class="partner-button" type="button">Go to website</button>
    </div>
  </div>

  <script src="./app.js?v=20260619-v5"></script>
</body>
</html>
